<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Lendir - Live</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #333; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .preview-img { width: 100%; border-radius: 12px; margin: 15px 0; display: none; border: 1px solid #444; }
        .btn { background: #00bcd4; color: black; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
        #status { font-size: 12px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="title">Memuat...</h2>
        
        <img src="" id="web-img" class="preview-img">
        
        <div id="price" style="font-size: 24px; font-weight: bold; margin: 10px 0;">Rp --</div>
        
        <a href="https://t.me/handlepreviewbot" class="btn">BELI VIA BOT</a>
        <div id="status">Menghubungkan ke database...</div>
    </div>

    <script>
        async function fetchData() {
            const statusEl = document.getElementById('status');
            try {
                // Gunakan cache-breaker agar data selalu fresh
                const response = await fetch('/api/data?t=' + Date.now());
                const data = await response.json();

                if (data.preview_url) {
                    document.getElementById('title').innerText = data.nama_paket;
                    document.getElementById('price').innerText = "Rp " + data.harga_vip;
                    
                    const img = document.getElementById('web-img');
                    img.src = data.preview_url;
                    img.style.display = 'block';
                    
                    statusEl.innerText = "Data Berhasil Dimuat";
                    statusEl.style.color = "#0f0";
                }
            } catch (err) {
                statusEl.innerText = "Gagal memuat. Mencoba lagi dalam 3 detik...";
                statusEl.style.color = "#f00";
                setTimeout(fetchData, 3000);
            }
        }

        fetchData();
    </script>
</body>
</html>
