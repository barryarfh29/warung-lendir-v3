<!DOCTYPE html>
<html>
<head>
    <title>Warung LENDIR Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #00f2ff; padding: 30px; display: inline-block; border-radius: 20px; background: #111; box-shadow: 0 0 20px #00f2ff44; max-width: 350px; }
        .price { font-size: 3rem; color: #00f2ff; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }
        .preview-img { width: 100%; border-radius: 10px; margin: 20px 0; border: 1px solid #333; }
        .btn { display: block; background: #00f2ff; color: black; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>WARUNG LENDIR</h1>
    
    <div class="card">
        <h2 style="margin-bottom: 5px;">{{ data.nama_paket }}</h2>
        <div class="price">Rp {{ data.harga_vip }}</div>
        
        <img src="{{ data.preview_url }}" class="preview-img">
        
        <a href="https://t.me/WarungLENDIR_Robot" class="btn">BELI VIA BOT</a>
    </div>
</body>
</html>
