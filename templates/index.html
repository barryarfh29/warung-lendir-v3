<script>
    async function loadData() {
        const status = document.getElementById('status');
        try {
            console.log("Mencoba mengambil data...");
            const response = await fetch('/api/data');
            
            if (!response.ok) {
                throw new Error("Server merespon dengan status: " + response.status);
            }
            
            const data = await response.json();
            console.log("Data diterima:", data);

            if (data.preview_url) {
                document.getElementById('title').innerText = data.nama_paket;
                document.getElementById('price').innerText = "Rp " + data.harga_vip;
                
                const img = document.getElementById('web-img');
                img.src = data.preview_url;
                img.style.display = 'block';
                
                status.innerText = "Terhubung!";
                status.style.color = "#0f0";
                document.getElementById('loader').style.display = 'none';
            }
        } catch (error) {
            console.error("ERROR FETCH:", error);
            status.innerText = "Error: " + error.message;
            status.style.color = "#f00";
            // Coba lagi dalam 5 detik
            setTimeout(loadData, 5000);
        }
    }
    loadData();
</script>
